name: course
description: 课程管理，包括视频/音频/图文等课程
routes:
    create:
        method: POST
        path: /admin/courses
        description: 创建课程
        template:
            courseAvatar:
                description: 课程封面
                required: true
                type: string
                minLength: 1
                maxLength: 255
            courseType:
                description: 课程类型, 0-视频课程, 1-音频课程, 2-图文课程
                required: true
                type: int
            playMode:
                description: 视频播放模式, 1-横屏播放(推荐) 2-竖屏播放。仅用于视频课程
                required: false
                type: int
            articleType:
                description: |
                    图文模式选择，仅用于图文课程
                    - type=1(图文模式, 推荐): 基础图片文本结合模式，简洁明了，适用于课程引流
                    - type=2(文章模式): 适合擅长文字写作的商家，做付费文章，文字分享
                    - type=3(多图模式): 适合擅长用图片讲解具体步骤的商家，图片为主、文字为辅，适用于技术教程、辅助教学
                required: false
                type: int
            articleImgs:
                description: 主图, 最多可添加10张。当使用图文课程的多图模式时, 必须设置
                required: false
                type: array
                example: |
                    [{"imgUrl": "https://example.com/image.jpg"}]
            detailInfo:
                description: |
                    课程详情, 支持图文混合排版。推荐使用富文本(type=1)实现完整排版效果。
                    - 限制：能用一个富文本/纯文本块就不要使用多个
                    - type=1(富文本，推荐)：支持 HTML 标签，可包含标题、段落、列表、图片等，实现图文混合排版
                    - type=4(纯文本)：普通文本内容
                    - type=5(图片)：独立图片展示
                required: true
                type: array
                example: |
                    [{"type": 1, "content": "<h2>课程简介</h2><p>这是课程介绍内容</p><img src=\"https://example.com/image.jpg\"/><ul><li>要点一</li><li>要点二</li></ul>", "title": ""}]
            isSaleOnly:
                description: 是否单独售卖, 1-是 0-否
                required: true
                default: 1
                type: int
            name:
                description: 课程名称
                required: true
                type: string
                minLength: 1
                maxLength: 50
            payType:
                description: 售卖类型, 1-免费, 2-付费, 3-加密
                required: true
                type: int
            encrypt:
                description: 加密密码, payType = 3 时需要设置
                required: false
                type: string
            price:
                description: 课程价格, payType = 1 时价格为 0, payType = 2 时需要大于 0
                required: true
                type: float
            status:
                description: 上下架状态, 1-上架, 2-下架, 3-定时上架
                required: true
                default: 1
                type: int
            delayTime:
                description: 定时上架时间，需大于当前时间
                required: false
                type: date
    delete:
        method: DELETE
        path: /admin/courses/{courseId}
        description: 删除课程
        template:
            courseId:
                description: 课程ID
                required: true
                type: path
    get:
        method: GET
        path: /admin/courses/{courseId}/edit
        description: 获取课程详情
        template:
            courseId:
                description: 课程ID
                required: true
                type: path
        response:
            fields:
                - data.courseId
                - data.name
                - path: data.courseType
                  description: "课程类型, 0-视频 1-音频 2-图文"
                - path: data.status
                  description: "上架状态, 1-已上架 2-已下架 3-定时上架"
                - path: data.isSaleOnly
                  description: "是否单独售卖, 1-是 0-否"
                - data.price
                - path: data.payType
                  description: "售卖类型, 1-免费 2-付费 3-加密"
                - data.courseAvatar
                - data.detailInfo
                - path: data.playMode
                  description: "播放模式, 1-横屏 2-竖屏（仅视频课程）"
                - path: data.articleType
                  description: "图文模式, 1-图文 2-文章 3-多图（仅图文课程）"
                - data.articleImgs
                - data.delayTime
                - data.createdAt
                - data.updatedAt
    list:
        method: GET
        path: /admin/courses
        description: 获取课程列表(视频/音频/图文)
        template:
            courseType:
                description: 课程类型, 0-视频 1-音频 2-图文
                required: false
                type: int
            limit:
                description: 每页数量
                required: true
                default: 20
                type: int
                max: 50
            name:
                description: 按课程名称搜索
                required: false
            page:
                description: 页码
                required: true
                default: 1
                type: int
                max: 100
            sort:
                description: 排序字段, 1-按时间排序, 3-按序号排序(默认)
                required: true
                type: int
                default: 3
            status:
                description: 上架状态, 1-已上架 2-已下架
                required: false
                default: 1
                type: int
        response:
            fields:
                - list.data.courseId
                - path: list.data.name
                  description: 课程名称
                - path: list.data.courseType
                  description: "课程类型, 0-视频 1-音频 2-图文"
                - path: list.data.status
                  description: "上架状态, 1-已上架 2-已下架 3-定时上架"
                - path: list.data.isSaleOnly
                  description: "是否单独售卖, 1-是 0-否"
                - list.data.price
                - path: list.data.payType
                  description: "售卖类型, 1-免费 2-付费 3-加密"
                - list.data.courseAvatar
                - list.data.createdAt
                - path: list.data.contentAuditStatus
                  description: 内容审核状态, -1 审核失败, 1 审核通过, 0 审核中
                - path: list.data.adminUser
                  description: 创建者
                - list.from
                - list.to
                - list.total
                - list.current_page
                - list.last_page
                - list.per_page
    update:
        method: PUT
        path: /admin/courses/{courseId}
        description: 更新课程
        template:
            courseAvatar:
                description: 课程封面
                required: true
                type: string
                minLength: 1
                maxLength: 255
            courseId:
                description: 课程ID
                required: true
                type: path
            courseType:
                description: 课程类型, 0-视频课程, 1-音频课程, 2-图文课程
                required: true
                type: int
            playMode:
                description: 视频播放模式, 1-横屏播放 2-竖屏播放。仅用于视频课程
                required: false
                type: int
                default: 1
            articleType:
                description: |
                    图文模式选择，仅用于图文课程
                        - type=1(图文模式, 推荐): 基础图片文本结合模式，简洁明了，适用于课程引流
                        - type=2(文章模式): 适合擅长文字写作的商家，做付费文章，文字分享
                        - type=3(多图模式): 适合擅长用图片讲解具体步骤的商家，图片为主、文字为辅，适用于技术教程、辅助教学
                required: false
                type: int
            articleImgs:
                description: 主图, 最多可添加10张。当使用图文课程的多图模式时, 必须设置
                required: false
                type: array
                example: |
                    [{"imgUrl": "https://example.com/image.jpg"}]
            detailInfo:
                description: |
                    课程详情, 支持图文混合排版。推荐使用富文本(type=1)实现完整排版效果。
                    - 限制：能用一个富文本/纯文本块就不要使用多个
                    - type=1(富文本，推荐)：支持 HTML 标签，可包含标题、段落、列表、图片等，实现图文混合排版
                    - type=4(纯文本)：普通文本内容
                    - type=5(图片)：独立图片展示
                required: true
                type: array
                example: |
                    [{"type": 1, "content": "<h2>课程简介</h2><p>这是课程介绍内容</p><img src=\"https://example.com/image.jpg\"/><ul><li>要点一</li><li>要点二</li></ul>", "title": ""}]
            isSaleOnly:
                description: 是否单独售卖, 1-是 0-否
                required: true
                default: 1
                type: int
            name:
                description: 课程名称
                required: true
                type: string
                minLength: 1
                maxLength: 50
            payType:
                description: 售卖类型, 1-免费, 2-付费, 3-加密
                required: true
                type: int
            encrypt:
                description: 加密密码, payType = 3 时需要设置
                required: false
                type: string
            price:
                description: 课程价格, payType = 1 时价格为 0, payType = 2 时需要大于 0
                required: true
                type: float
            status:
                description: 上下架状态, 1-上架, 2-下架, 3-定时上架
                required: true
                default: 1
                type: int
            delayTime:
                description: 定时上架时间，需大于当前时间
                required: false
                type: date
