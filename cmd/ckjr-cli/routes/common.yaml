name: common
description: 公共接口，可以获取公众号端访问 URL 等
routes:
    link:
        method: GET
        path: /admin/common/qrcodeImg
        description: 获取公众号端访问 URL 和二维码图片
        template:
            prodId:
                description: 产品ID
                required: true
                type: int
            prodType:
                description: |
                    产品类型说明
                    - ai_service: 智能体
                    - video: 视频课程
                    - audio: 音频课程
                    - text: 图文课程
                type: string
                required: true
                example: ai_service
        response:
            - path: url
              description: 访问链接
            - path: img
              description: 二维码

