name: agent
description: AI智能体管理
routes:
    create:
        method: POST
        path: /admin/aiCreationCenter/createApp
        description: 创建智能体
        template:
            avatar:
                description: 头像URL
                required: true
                type: string
                example: https://ck-bkt-knowledge-payment.oss-cn-hangzhou.aliyuncs.com/y99rjd/resource/imgs/120b2b85/admin-fe_y99rjd_material_BAwRCWsQW2tMd6nHichk.png
                minLength: 1
                maxLength: 255
                autoUpload: image
            botType:
                description: 智能体类型, 99-自营智能体
                required: false
                default: 99
                type: int
            desc:
                description: 描述
                required: true
                type: string
                minLength: 1
                maxLength: 200
            isSaleOnly:
                description: 是否支持售卖, 1-交付型/角色类 0-客服型
                required: false
                default: 1
                type: int
            name:
                description: 智能体名称
                required: true
                type: string
                minLength: 1
                maxLength: 20
            promptType:
                description: 提示词模板类型, 1-交付型 3-角色类/客服型
                required: false
                default: 3
                type: int
        response:
            - path: aikbId
              description: 智能体ID
    delete:
        method: POST
        path: /admin/aiCreationCenter/deleteApp
        description: 删除智能体
        template:
            aikbId:
                description: 智能体ID
                required: true
                type: int
    get:
        method: POST
        path: /admin/aiCreationCenter/describeApp
        description: 获取智能体详情
        template:
            aikbId:
                description: 智能体ID
                required: true
                type: int
        response:
            - path: aikbId
              description: 智能体ID
            - path: name
              description: 智能体名称
            - path: avatar
              description: 智能体头像URL
            - path: desc
              description: 智能体描述
            - path: botType
              description: 智能体类型, 99-自营智能体, 100-扣子智能体
            - path: greeting
              description: 开场白文案
            - path: instructions
              description: 智能体提示词
            - path: price
              description: 价格
            - path: status
              description: 状态, 1-正常 3-下架
    list:
        method: POST
        path: /admin/aiCreationCenter/listApp
        description: 获取智能体列表
        template:
            enablePagination:
                description: 是否分页返回, 1-是 0-否
                required: false
                default: 0
                type: int
            limit:
                description: 每页数量
                required: false
                default: 20
                type: int
                max: 50
            name:
                description: 按名称搜索
                required: false
            page:
                description: 页码
                required: false
                default: 1
                type: int
                max: 100
            platType:
                description: 智能体类型, 0-全部 1-自营智能体 2-Coze智能体
                required: false
                default: 0
                type: int
    setAppInfo:
        method: POST
        path: /admin/aiCreationCenter/setAppInfo
        description: 更新智能体售卖设置
        template:
            aikbId:
                description: 智能体ID
                required: true
                type: int
            payPassword:
                description: 加密密码, 当 permissionType = 3 时需要设置
                required: false
            permissionType:
                description: |
                    用户使用智能体的计费方式
                        0-免费
                        1-按次数, 交付型智能体使用
                        2-按分钟, 角色类智能体使用
                        3-加密
                required: true
                type: int
            price:
                description: |
                    智能体整体售价(元), 不是按次/按分钟的单价
                      - 免费: 价格为 0, permissionType = 0
                      - 付费: 价格大于 0, permissionType in (1, 2)
                      - 加密: 价格为 0, permissionType = 3
                required: true
                type: float
            status:
                description: 上下架状态, 1-立即上架, 3-下架
                required: false
                type: int
                default: 1
    update:
        method: POST
        path: /admin/aiCreationCenter/modifyApp
        description: 更新智能体
        template:
            aikbId:
                description: 智能体ID
                required: true
                type: int
            avatar:
                description: 智能体头像URL
                required: true
                type: string
                minLength: 1
                maxLength: 255
                autoUpload: image
            desc:
                description: 智能体描述
                required: true
                type: string
                minLength: 1
                maxLength: 200
            greeting:
                description: 开场白文案
                required: false
                type: string
                minLength: 1
                maxLength: 200
            instructions:
                description: 智能体提示词
                required: true
                type: string
                minLength: 1
                maxLength: 10000
            name:
                description: 智能体名称
                required: true
                type: string
                minLength: 1
                maxLength: 20
        response:
            - path: aikbId
              description: 智能体ID
