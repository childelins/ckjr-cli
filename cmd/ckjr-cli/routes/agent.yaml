name: agent
description: AI智能体管理
routes:
    create:
        method: POST
        path: /admin/aiCreationCenter/createApp
        description: 创建智能体
        template:
            name:
                description: 智能体名称
                required: true
                type: string
                minLength: 1
                maxLength: 20
            avatar:
                description: 头像URL
                required: true
                type: string
                minLength: 1
                maxLength: 255
                example: https://ck-bkt-knowledge-payment.oss-cn-hangzhou.aliyuncs.com/y99rjd/resource/imgs/120b2b85/admin-fe_y99rjd_material_BAwRCWsQW2tMd6nHichk.png
            botType:
                description: 智能体类型, 99-自营智能体
                required: false
                default: 99
                type: int
            desc:
                description: 描述
                required: true
                type: string
                minLength: 1
                maxLength: 200
            isSaleOnly:
                description: 是否支持售卖, 1-交付型 0-客服型
                required: false
                default: 1
                type: int
            promptType:
                description: 提示词模板类型, 1-交付型 3-角色类/客服型
                required: false
                default: 3
                type: int
        response:
            - path: aikbId
              description: 智能体ID
    delete:
        method: POST
        path: /admin/aiCreationCenter/deleteApp
        description: 删除智能体
        template:
            aikbId:
                description: 智能体ID
                required: true
                type: int
    get:
        method: POST
        path: /admin/aiCreationCenter/describeApp
        description: 获取智能体详情
        template:
            aikbId:
                description: 智能体ID
                required: true
                type: int
        response:
            - path: aikbId
              description: 智能体ID
            - path: name
              description: 智能体名称
            - path: avatar
              description: 智能体头像URL
            - path: desc
              description: 智能体描述
            - path: botType
              description: 智能体类型, 99-自营智能体, 100-扣子智能体
            - path: greeting
              description: 开场白文案
            - path: instructions
              description: 智能体提示词
            - path: price
              description: 价格
            - path: status
              description: 状态, 1-正常 3-下架

    list:
        method: POST
        path: /admin/aiCreationCenter/listApp
        description: 获取智能体列表
        template:
            enablePagination:
                description: 是否分页返回, 1-是 0-否
                required: false
                default: 0
                type: int
            limit:
                description: 每页数量
                required: false
                default: 20
                type: int
                max: 50
            name:
                description: 按名称搜索
                required: false
            page:
                description: 页码
                required: false
                default: 1
                type: int
                max: 100
            platType:
                description: 智能体类型, 0-全部 1-自营智能体 2-Coze智能体
                required: false
                default: 0
                type: int
    update:
        method: POST
        path: /admin/aiCreationCenter/modifyApp
        description: 更新智能体
        template:
            aikbId:
                description: 智能体ID
                required: true
                type: int
            avatar:
                description: 智能体头像URL
                required: true
                type: string
                minLength: 1
                maxLength: 255
            desc:
                description: 智能体描述
                required: true
                type: string
                minLength: 1
                maxLength: 200
            greeting:
                description: 开场白文案
                required: false
                type: string
                maxLength: 200
            instructions:
                description: 智能体提示词
                required: true
                type: string
                minLength: 1
                maxLength: 10000
            name:
                description: 智能体名称
                required: true
                type: string
                minLength: 1
                maxLength: 20
        response:
            - path: aikbId
              description: 智能体ID
