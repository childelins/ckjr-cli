  create-article-course:
    description: 创建图文课程并获取访问链接
    triggers:
      - 创建图文课程
      - 新建图文课程
    allowed-routes:
      - course
      - common
      - asset
    inputs:
      - name: name
        description: 课程名称
        required: true
      - name: courseAvatar
        description: 课程封面 URL
        required: true
      - name: detailInfo
        description: 课程详情
        required: true
