name: course-workflows
description: 课程创建工作流，支持视频/音频/图文课程

workflows:
  create-video-course:
    description: 创建视频课程并获取访问链接
    triggers:
      - 创建视频课程
      - 新建视频课程
    allowed-routes:
      - course
      - common
      - asset
    inputs:
      - name: name
        description: 课程名称
        required: true
      - name: courseAvatar
        description: 课程封面 URL
        required: true
      - name: detailInfo
        description: 课程详情
        required: true
        hint: 根据用户描述生成富文本 HTML
      - name: payType
        description: 售卖类型, 1-免费 2-付费 3-加密
        required: true
      - name: price
        description: 价格
        required: true
      - name: playMode
        description: 播放模式, 1-横屏(默认) 2-竖屏
        required: false
        hint: 默认横屏(1)
    steps:
      - id: upload-avatar
        description: 如果课程封面是外部图片URL，先转存到系统素材库
        command: asset upload-image
        params:
          url: "{{inputs.courseAvatar}}"
        output:
          imageUrl: "response.imageUrl"
      - id: create
        description: 创建视频课程
        command: course create
        params:
          name: "{{inputs.name}}"
          courseAvatar: "{{steps.upload-avatar.imageUrl}}"
          detailInfo: "{{inputs.detailInfo}}"
          payType: "{{inputs.payType}}"
          price: "{{inputs.price}}"
          playMode: "{{inputs.playMode}}"
          courseType: 0
          isSaleOnly: 1
          status: 1
        output:
          courseId: "response.courseId"
      - id: get-link
        description: 获取公众号端访问链接和二维码
        command: common link
        params:
          prodId: "{{steps.create.courseId}}"
          prodType: video
        output:
          url: "response.url"
          qrcodeImg: "response.img"
    summary: |
      视频课程创建完成：
      - 名称：{{inputs.name}}
      - ID：{{steps.create.courseId}}
      - 访问链接：{{steps.get-link.url}}
      - 二维码：{{steps.get-link.qrcodeImg}}

  create-audio-course:
