      - name: payType
        description: 售卖类型, 1-免费 2-付费 3-加密
        required: true
      - name: price
        description: 价格
        required: true
      - name: articleType
        description: 图文模式, 1-图文(默认) 2-文章 3-多图
        required: false
        hint: 默认图文模式(1)
    steps:
      - id: upload-avatar
        description: 如果课程封面是外部图片URL，先转存到系统素材库
