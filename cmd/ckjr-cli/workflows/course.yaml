      - name: payType
        description: 售卖类型, 1-免费 2-付费 3-加密
        required: true
      - name: price
        description: 价格
        required: true
    steps:
      - id: upload-avatar
        description: 如果课程封面是外部图片URL，先转存到系统素材库
        command: asset upload-image
        params:
          url: "{{inputs.courseAvatar}}"
        output:
          imageUrl: "response.imageUrl"
      - id: create
        description: 创建音频课程
        command: course create
