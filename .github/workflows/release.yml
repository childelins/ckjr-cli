name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          BINARY_NAME=ckjr
          if [ "$GOOS" = "windows" ]; then
            BINARY_NAME=ckjr.exe
          fi
          mkdir -p dist/ckjr_${VERSION}_${GOOS}_${GOARCH}
          go build -ldflags="-s -w -X main.Version=${VERSION}" -o dist/ckjr_${VERSION}_${GOOS}_${GOARCH}/${BINARY_NAME} .

      - name: Create archive
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          cd dist
          for dir in */; do
            dirname=${dir%/}
            if [[ "$dirname" == *windows* ]]; then
              zip -r ${dirname}.zip ${dirname}
            else
              tar -czvf ${dirname}.tar.gz ${dirname}
            fi
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binaries-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
